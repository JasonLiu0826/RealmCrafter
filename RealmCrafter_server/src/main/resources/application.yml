spring:
  application:
    name: realmcrafter-server
  datasource:
    url: jdbc:mysql://localhost:3306/realmcrafter?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: ''
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    open-in-view: false
  redis:
    host: localhost
    port: 6379
    password: ''
    database: 0

server:
  port: 8080

# 计费：每章消耗 Token 数
realmcrafter:
  billing:
    tokens-per-chapter: 5000
