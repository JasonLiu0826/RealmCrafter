spring:
  application:
    name: realmcrafter-server
  datasource:
    url: jdbc:mysql://localhost:3306/realmcrafter?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 'LiuYF20050826'
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    open-in-view: false
  redis:
    host: localhost
    port: 6379
    password: ''
    database: 0

server:
  port: 8080

# 计费：每章消耗 Token 数
realmcrafter:
  billing:
    tokens-per-chapter: 5000
  share:
    # 站外深度链接根域名，用于生成 https://realmcrafter.app/s/{shortCode}
    base-url: https://realmcrafter.app
  # JWT：生产环境务必更换 secret（至少 32 字节）
  jwt:
    secret: RealmCrafterDefaultSecretKeyForDevOnly32Bytes!!
    expiration-ms: 604800000
  # 上传：本地目录或 OSS 配置，见 ObjectStorageService 实现
  upload:
    base-dir: uploads
    base-url: http://localhost:8080/api/v1/upload/files
